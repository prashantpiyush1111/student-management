<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Student Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated background dots */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #1e3a5f 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: 0;
        }

        .login-box {
            position: relative;
            z-index: 1;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 1.6rem;
            color: #60a5fa;
            font-weight: 700;
        }

        .logo p {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: #475569;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .form-group input::placeholder { color: #475569; }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            letter-spacing: 0.03em;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        .btn-login:active { transform: translateY(0); }

        .error-msg {
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            color: #f87171;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }

        .error-msg.show { display: block; }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: #334155;
        }

        .divider {
            border: none;
            border-top: 1px solid #1e293b;
            margin: 24px 0 20px;
        }
    </style>
</head>
<body>

<div class="login-box">

    <div class="logo">
        <span class="icon">🎓</span>
        <h1>Student Management</h1>
        <p>Admin Portal — Please login to continue</p>
    </div>

    <div class="error-msg" id="errorMsg">
        Wrong username or password. Try again.
    </div>

    <form method="post" action="/login">

        <div class="form-group">
            <label>Username</label>
            <div class="input-wrap">
                <span class="icon-left">👤</span>
                <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <span class="icon-left">🔒</span>
                <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
        </div>

        <button type="submit" class="btn-login"> Login</button>

    </form>

    <p class="footer-note">Student Management System v1.0 &nbsp;•&nbsp; Spring Boot</p>
</div>

<script>
    if (window.location.search.includes('error=true')) {
        document.getElementById('errorMsg').classList.add('show');
    }
</script>

</body>
</html>
